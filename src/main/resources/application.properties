spring.application.name=supermercado
server.port=80

#Conexion a base de datos a Mysql
spring.datasource.url=jdbc:mysql://localhost:3306/supermercado

#Usuario
spring.datasource.username=usuario01
spring.datasource.password=clave123.

#Drivers y plataformas
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

#Mostra info en el log de base de datos
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=debug
logging.level.org.type.descriptor.sql.BasicBinder=trace

#Esta información se utiliza para obtener acceso a su storage. // Aqui se cambia los firebase dependiendo del proyecto. 
firebase.bucket.name=techshop-d0265.firebasestorage.app
firebase.storage.path=supermercado
firebase.json.path=firebase
firebase.json.file=techshop-d0265-firebase-adminsdk-fbsvc-13c8408f05.json